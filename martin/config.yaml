postgres:
  connection_string: $DATABASE_URL

  tables:
    osem_bike_data:
      layer_id: osem_bike_data

      # Table schema (required)
      schema: public

      # Table name (required)
      table: osem_bike_data

      # Geometry SRID (required)
      srid: 4326

      # Geometry column name (required)
      # NOTE: Column name matches OpenSenseMapToolbox format for pygeoapi compatibility
      geometry_column: geometry

      # Feature id column name
      id_column: index

      # Geometry type
      geometry_type: GEOMETRY

      # List of columns, that should be encoded as tile properties (required)
      # NOTE: Column names match OpenSenseMapToolbox output format for pygeoapi compatibility
      properties:
        boxId: string
        boxName: string
        groupTags: string
        createdAt: timestamp
        Temperature: number
        Rel. Humidity: number
        Finedust PM1: number
        Finedust PM2.5: number
        Finedust PM4: number
        Finedust PM10: number
        Overtaking Distance: number
        Overtaking Manoeuvre: number
        Standing: number
        Surface Asphalt: number
        Surface Compacted: number
        Surface Paving: number
        Surface Sett: number
        Speed: number
        Distance Right: number
        created_at: timestamp
        longitude: number
        latitude: number